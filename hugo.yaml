baseURL: "https://ice-ice-bear.github.io/"
title: "ICE-ICE-BEAR-BLOG"
theme: stack
paginate: 10
languageCode: en
defaultContentLanguage: en
timezone: "Asia/Seoul"
enableRobotsTXT: true

services:
  googleAnalytics:
    ID: "G-NN4NMPBB8X"

params:
  mainSections:
    - posts
  featuredImageField: image
  rssFullContent: true
  favicon: /images/profile.png

  footer:
    since: 2024

  dateFormat:
    published: "2006-01-02"
    lastUpdated: "2006-01-02 15:04"

  colorScheme:
    toggle: true
    default: auto

  article:
    math: true
    toc: true
    readingTime: true
    license:
      enabled: false

  sidebar:
    compact: false
    subtitle: "Achieve with GRIT"
    avatar: img/avatar.png

  widgets:
    homepage:
      - type: search
      - type: archives
        params:
          limit: 5
      - type: categories
        params:
          limit: 10
      - type: tag-cloud
        params:
          limit: 15
    page:
      - type: toc

languages:
  en:
    languageName: English
    weight: 1
    contentDir: content/en
    menu:
      main:
        - identifier: posts
          name: Posts
          url: /posts/
          weight: 10
          params:
            icon: archives
        - identifier: categories
          name: Categories
          url: /categories/
          weight: 20
          params:
            icon: categories
        - identifier: tags
          name: Tags
          url: /tags/
          weight: 30
          params:
            icon: tag
        - identifier: search
          name: Search
          url: /search/
          weight: 40
          params:
            icon: search
      social:
        - identifier: github
          name: GitHub
          url: "https://github.com/ice-ice-bear"
          weight: 10
          params:
            icon: brand-github
        - identifier: email
          name: Email
          url: "mailto:3balbi7@gmail.com"
          weight: 20
          params:
            icon: mail
  ko:
    languageName: 한국어
    weight: 2
    contentDir: content/ko
    hasCJKLanguage: true
    menu:
      main:
        - identifier: posts
          name: 포스트
          url: /posts/
          weight: 10
          params:
            icon: archives
        - identifier: categories
          name: 카테고리
          url: /categories/
          weight: 20
          params:
            icon: categories
        - identifier: tags
          name: 태그
          url: /tags/
          weight: 30
          params:
            icon: tag
        - identifier: search
          name: 검색
          url: /search/
          weight: 40
          params:
            icon: search
      social:
        - identifier: github
          name: GitHub
          url: "https://github.com/ice-ice-bear"
          weight: 10
          params:
            icon: brand-github
        - identifier: email
          name: Email
          url: "mailto:3balbi7@gmail.com"
          weight: 20
          params:
            icon: mail

outputs:
  home:
    - HTML
    - RSS

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true
    lineNos: false
    style: monokai
